name: LearnUS 일정 자동 수집

on:
  schedule:
    # 매일 오전 7시 KST (= UTC 22:00, 전날)
    - cron: '0 22 * * *'
  # 수동 실행도 가능 (GitHub Actions 탭에서 "Run workflow" 버튼)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Python 설정
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Secrets 확인 (디버그)
        env:
          LEARNUS_ID: ${{ secrets.LEARNUS_ID }}
          LEARNUS_PW: ${{ secrets.LEARNUS_PW }}
        run: |
          python - <<'EOF'
          import os
          uid = os.environ.get('LEARNUS_ID', '')
          pw  = os.environ.get('LEARNUS_PW', '')
          print(f"ID 앞 3자리: {uid[:3]}***")
          print(f"ID 길이: {len(uid)}")
          print(f"PW 길이: {len(pw)}")
          print(f"PW 앞 1자리: {pw[:1]}***")
          EOF

      - name: LearnUS 데이터 수집 → GAS 전송
        env:
          LEARNUS_ID: ${{ secrets.LEARNUS_ID }}
          LEARNUS_PW: ${{ secrets.LEARNUS_PW }}
          GAS_URL:    ${{ secrets.GAS_URL }}
        run: python fetch_learnus.py
